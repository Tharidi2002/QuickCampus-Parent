# Eureka client configuration
eureka:
  client:
    # A list of Eureka servers for the client to connect to.
    # Using the internal IPs of the Eureka cluster nodes.
    serviceUrl:
      defaultZone: http://10.148.0.3:9001/eureka/,http://10.148.0.4:9001/eureka/,http://10.148.0.5:9001/eureka/
  instance:
    # Prefer registering with the IP address of the instance.
    prefer-ip-address: true
